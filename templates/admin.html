{% extends "base.html" %}
{% block title %}管理员控制台 - RAG 对话系统{% endblock %}

{% block content %}
<div class="container py-4">
    <h3 class="mb-4"><i class="bi bi-shield-lock"></i> 管理员控制台</h3>

    <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#usersPane" type="button">
                <i class="bi bi-people"></i> 用户管理
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="files-tab" data-bs-toggle="tab" data-bs-target="#filesPane" type="button">
                <i class="bi bi-folder"></i> 知识库文件管理
            </button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="usersPane">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">所有用户</h5>
                    <button class="btn btn-outline-primary btn-sm" onclick="loadUsers()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
                <div class="card-body p-0">
                    <div id="usersContainer">
                        <div class="text-center py-5 text-muted">
                            <div class="spinner-border" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="filesPane">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">所有知识库文件</h5>
                    <button class="btn btn-outline-primary btn-sm" onclick="loadAdminFiles()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
                <div class="card-body p-0">
                    <div id="adminFilesContainer">
                        <div class="text-center py-5 text-muted">
                            <div class="spinner-border" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="adminPasswordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">修改用户密码</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>正在为用户 <strong id="targetUserEmail"></strong> 修改密码</p>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-control" id="adminNewPassword" placeholder="输入新密码（至少4位）" minlength="4">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="adminChangePwdBtn" onclick="adminChangePassword()">确认修改</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let targetUserId = null;

async function loadUsers() {
    try {
        const resp = await api('/api/admin/users');
        const users = await resp.json();
        renderUsers(users);
    } catch (e) {
        console.error('加载用户列表失败', e);
        const container = document.getElementById('usersContainer');
        container.innerHTML = '<div class="text-center py-4 text-danger">加载失败，请确认您有管理员权限</div>';
    }
}

function renderUsers(users) {
    const container = document.getElementById('usersContainer');
    if (users.length === 0) {
        container.innerHTML = '<div class="text-center py-4 text-muted">暂无用户</div>';
        return;
    }
    const currentUser = getUser();
    container.innerHTML = `
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${users.map(u => `
                        <tr>
                            <td>${u.id}</td>
                            <td>
                                ${escapeHtml(u.email)}
                                ${u.is_admin ? '<span class="badge bg-danger ms-2">管理员</span>' : ''}
                            </td>
                            <td>${u.is_admin ? '管理员' : '普通用户'}</td>
                            <td>${formatTime(u.created_at)}</td>
                            <td>
                                <button class="btn btn-outline-secondary btn-sm me-1"
                                    onclick="showAdminPasswordModal(${u.id}, '${escapeHtml(u.email)}')">
                                    <i class="bi bi-key"></i> 改密
                                </button>
                                ${u.id !== (currentUser?.id || 0) ? `
                                    <button class="btn btn-outline-danger btn-sm"
                                        onclick="deleteUser(${u.id})">
                                        <i class="bi bi-trash"></i> 删除
                                    </button>
                                ` : ''}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
}

function showAdminPasswordModal(userId, email) {
    targetUserId = userId;
    document.getElementById('targetUserEmail').textContent = email;
    document.getElementById('adminNewPassword').value = '';
    const modal = new bootstrap.Modal(document.getElementById('adminPasswordModal'));
    modal.show();
}

async function adminChangePassword() {
    const newPwd = document.getElementById('adminNewPassword').value;
    if (!newPwd || newPwd.length < 4) {
        showToast('新密码至少4位', 'error');
        return;
    }
    try {
        const resp = await api(`/api/admin/users/${targetUserId}/password`, {
            method: 'PUT',
            body: JSON.stringify({ new_password: newPwd }),
        });
        if (resp.ok) {
            const data = await resp.json();
            showToast(data.message || '密码已修改', 'success');
            bootstrap.Modal.getInstance(document.getElementById('adminPasswordModal')).hide();
        } else {
            const data = await resp.json();
            showToast(data.detail || '修改失败', 'error');
        }
    } catch (e) {
        showToast('操作失败', 'error');
    }
}

async function deleteUser(userId) {
    if (!confirm('确定删除此用户？其所有会话、知识库和向量数据将被永久清除！')) return;
    try {
        const resp = await api(`/api/admin/users/${userId}`, { method: 'DELETE' });
        if (resp.ok) {
            const data = await resp.json();
            showToast(data.message || '用户已删除', 'success');
            loadUsers();
        } else {
            const data = await resp.json();
            showToast(data.detail || '删除失败', 'error');
        }
    } catch (e) {
        showToast('操作失败', 'error');
    }
}

async function loadAdminFiles() {
    try {
        const resp = await api('/api/admin/knowledge/files');
        const files = await resp.json();
        renderAdminFiles(files);
    } catch (e) {
        console.error('加载文件列表失败', e);
    }
}

function renderAdminFiles(files) {
    const container = document.getElementById('adminFilesContainer');
    if (files.length === 0) {
        container.innerHTML = '<div class="text-center py-4 text-muted">暂无文件</div>';
        return;
    }
    container.innerHTML = `
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>文件名</th>
                        <th>所属用户ID</th>
                        <th>分段数</th>
                        <th>大小</th>
                        <th>上传时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${files.map(f => `
                        <tr>
                            <td>${f.id}</td>
                            <td>${escapeHtml(f.original_filename)}</td>
                            <td>${f.user_id}</td>
                            <td>${f.chunk_count}</td>
                            <td>${(f.file_size / 1024).toFixed(1)} KB</td>
                            <td>${formatTime(f.created_at)}</td>
                            <td>
                                <button class="btn btn-outline-danger btn-sm"
                                    onclick="deleteAdminFile(${f.id})">
                                    <i class="bi bi-trash"></i> 删除
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
}

async function deleteAdminFile(fileId) {
    if (!confirm('确定删除此文件？对应的向量数据也将被清除。')) return;
    try {
        const resp = await api(`/api/knowledge/files/${fileId}`, { method: 'DELETE' });
        if (resp.ok) {
            showToast('文件已删除', 'success');
            loadAdminFiles();
        } else {
            const data = await resp.json();
            showToast(data.detail || '删除失败', 'error');
        }
    } catch (e) {
        showToast('操作失败', 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    if (getToken()) {
        const user = getUser();
        if (user && !user.is_admin) {
            showToast('您没有管理员权限', 'error');
            setTimeout(() => { window.location.href = '/chat'; }, 1500);
            return;
        }
        loadUsers();
        loadAdminFiles();
    }
});
</script>
{% endblock %}
